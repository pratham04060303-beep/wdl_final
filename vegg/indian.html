<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Indian Food</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body, html {
    height: 100%;
}

/* Background video */
video {
    position: fixed;
    top: 0;
    left: 0;
    min-width: 100%;
    min-height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* Overlay */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    color: white;
}


.back-btn {
    padding: 10px 15px;
    border: none;
    background: orange;
    cursor: pointer;
    border-radius: 5px;
    
}
.home-btn {
    padding: 10px 15px;
    border: none;
    background: orange;
    cursor: pointer;
    border-radius: 5px;
    font-weight: bold;
}
.home-btn:hover {
    transform: scale(1.05);
}

.back-btn:hover {
    transform: scale(1.05);
}

.nav-buttons {
    display: flex;
    gap: 10px; /* space between buttons */
}

/* Grid layout */
.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr); /* 4 columns */
    gap: 20px;
    padding: 20px;
}

/* Each tile */
.tile {
     width: 220px;
    height: 180px;
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
}

/* Background image */
.tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Dark overlay on tile */
.tile::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    top: 0;
    left: 0;
}

/* Cuisine name */
.tile span {
    position: absolute;
    color: white;
    font-size: 20px;
    font-weight: bold;
    z-index: 2;
    margin-left: 40%;
    bottom: 20%;
    left: 100%;
    transform: translate(-50%, -50%);
}

/* Hover effect */
.tile:hover {
    transform: scale(1.05);
}
/* HERO SECTION (Indian banner) */
.Indian {
    position: relative;
    height: 300px;
    background: url("https://i1.wp.com/dranshublog.com/wp-content/uploads/2019/01/Chappan-Bhog.jpg?fit=700%2C436&ssl=1") center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
}

.Indian::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    top: 0;
    left: 0;
}

.Indian-content {
    position: relative;
    color: white;
    text-align: center;
    z-index: 2;
}

.Indian-content h1 {
    font-size: 32px;
}

.Indian-content p {
    font-size: 14px;
    margin-top: 10px;
    width: 80%;
    margin-left: auto;
    margin-right: auto;
}


.grid {
    display: grid;
    grid-auto-flow: column;              /* horizontal */
    grid-template-rows: repeat(2, 180px); /* 2 rows */
    gap: 20px;
    padding: 20px;
    overflow-x: auto;
    scroll-behavior: smooth;
}

/* hide scrollbar */
.grid::-webkit-scrollbar {
    display: none;
}

/* TILE */
.tile {
    min-width: 220px;  /* important for horizontal layout */
    height: 180px;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
}

/* Text on image */
.tile span {
    position: absolute;
    color: white;
    font-size: 18px;
    font-weight: bold;
    z-index: 2;
    bottom: 10px;
    left: 10px;
}
.scroll-wrapper {
    position: relative;
}

.scroll-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: orange;
    border: none;
    padding: 10px;
    cursor: pointer;
    z-index: 10;
}

.left-btn { left: 5px; }
.right-btn { right: 5px; }
</style>
</head>

<body>

<!-- Background Video -->
<video autoplay muted loop>
    <source src="/home/pratham/cookmate_wdl/cookmate_images/bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- Header -->
<div class="header">
    <h2>Choose Indian  Dish 🌱</h2>

    <div class="nav-buttons">
        <button class="back-btn" onclick="goBack()">⬅ Back</button>
        <button class="home-btn" onclick="goback()">⌘ Home</button>
    </div>
</div>
<div class="Indian">
    <div class="Indian-content">
        <h1>Indian Cuisine 🌱</h1>
        <p>
            Explore rich and diverse Indian vegetarian dishes filled with spices,
            flavors, and tradition. From creamy curries to street food favorites,
            discover meals that define Indian culture.
        </p>
    </div>
</div>
<!-- Grid -->
<div class="scroll-wrapper">

<button class="scroll-btn left-btn" onclick="scrollLeft()">◀</button>

<div class="grid" id="foodGrid">

    <!-- 12 Tiles -->
    

    <div class="tile" onclick="go('Chole Bhature.html')">
        <img src="https://madhurasrecipe.com/wp-content/uploads/2025/09/MR-Chole-Bhature-featured-585x585.jpg">
        <span>Chole Bhature</span>
    </div>

    <div class="tile" onclick="go('Dal Makhani.html')">
        <img src="https://myfoodstory.com/wp-content/uploads/2018/08/Dal-Makhani-New-1.jpg">
        <span>Dal Makhani</span>
    </div>

    

    <div class="tile" onclick="go('Baingan Bharta.html')">
        <img src="https://www.kuchpakrahahai.in/wp-content/uploads/2016/05/Baingan-Bharta-Recipe.jpg">
        <span>Baingan Bharta</span>
    </div>

  

  

    <div class="tile" onclick="go('Aloo Paratha.html')">
        <img src="https://www.sanjanafeasts.co.uk/wp-content/uploads/2025/07/Boursin-Aloo-Paratha-546x728.jpg.webp">
        <span>Aloo Paratha</span>
    </div>

    <div class="tile" onclick="go('paneer butter masala.html')">
        <img src="https://myfoodstory.com/wp-content/uploads/2021/07/Paneer-Butter-Masala-3.jpg">
        <span>paneer butter masala</span>
    </div>

    

</div>

<button class="scroll-btn right-btn" onclick="scrollRight()">▶</button>

</div>

<script>
function goback() {
        window.location.href = "/home/pratham/cookmate_wdl/initials /cookmate_f.html";
    }
function goBack() {
    window.location.href = "/home/pratham/cookmate_wdl/initials /veg.html";
}

function go(page) {
    window.location.href = page;
}
</script>

</body>
</html>
