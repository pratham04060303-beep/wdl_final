<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Choice</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Courier New", monospace;
}

        body, html {
            height: 100%;
            overflow: hidden;
        }

        /* Background Video */
        video {
            position: fixed;
            top: 0;
            left: 0;
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        /* Black transparent overlay */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); /* adjust opacity */
            z-index: -1;
        }

        /* Split layout */
        .container {
            display: flex;
            height: 100%;
        }

        .section {
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            
        }

        /* Divider line */
        .divider {
            position: absolute;
            left: 50%;
            top: 15%;
            height: 70%;
            width: 4px;
            background: white;
        }

        /* Veg / Non-veg buttons */
        .choice-btn {
            font-family: 'Permanent Marker', cursive;
            font-size: 85px;
            color: #ff2e2ec3;
            background: transparent;
            border: none;
            cursor: pointer;
            letter-spacing: 3px;
            text-transform: uppercase;

    /* 3D Effect */
    text-shadow: 
        1px 1px 0 #8a0c0c,
        2px 2px 0 #8a0c0c,
        3px 3px 0 #8a0c0c,
        4px 4px 5px rgba(157, 10, 10, 0.5);

    transition: 0.3s;
}

.choice-btn:hover {
    transform: translateY(-5px) scale(1.05);
}

        .choice-btn:hover {
            transform: scale(1.1);
            color: orange;
        }

        /* Top right buttons */
        .top-buttons {

            position: absolute;
            top: 20px;
            right: 20px;
        }

        .top-buttons button {
            margin-left: 20px;

            padding: 10px 15px;
            border: none;
            background:transparent;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bolder;
            font-size: 25px;
            color: aliceblue;
        }

        .top-buttons button:hover {
            background: rgb(179, 57, 9);
        }
    </style>
</head>
<body>

    <!-- Background Video -->
    <video autoplay  loop>
        <source src="../wdl_final/cookmate_images/bg.mp4">
        Your browser does not support video.
    </video>

    <!-- Dark overlay -->
    <div class="overlay"></div>

    <!-- Top Buttons -->
    <div class="top-buttons">
        <div class="section" onclick="goaboutus()">
            <button onclick="location.href='aboutus.html'">Contact Us</button>
            <button onclick="location.href='faq.html'">FAQ</button>
    </div>
        </div>

        
    </div>

    <!-- Split Screen -->
    <div class="container">
        <div class="section" onclick="goVeg()">
            <button class="choice-btn">VEG</button>
        </div>

        <div class="section" onclick="goNonVeg()">
            <button class="choice-btn">NON-VEG</button>
        </div>

        <div class="divider"></div>
    </div>

    <!-- Navigation Script -->
    <script>
        function goVeg() {
            window.location.href = "wdl_final/initials / veg.html"; // create later
        }

        function goNonVeg() {
            window.location.href = "wdl_final/wdl_final/initials /nonveg.html"; // create later
        }
        function aboutus() {
            window.location.href = "wdl_final/initials/aboutus.html"; // create later
        }
    </script>

</body>
</html>
