<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body, html {
    height: 100%;
}

/* Background video */
video {
    position: fixed;
    top: 0;
    left: 0;
    min-width: 100%;
    min-height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* Overlay */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    color: white;
}


.back-btn {
    padding: 10px 15px;
    border: none;
    background: orange;
    cursor: pointer;
    border-radius: 5px;
    
}
.home-btn {
    padding: 10px 15px;
    border: none;
    background: orange;
    cursor: pointer;
    border-radius: 5px;
    font-weight: bold;
}
.home-btn:hover {
    transform: scale(1.05);
}

.back-btn:hover {
    transform: scale(1.05);
}

.nav-buttons {
    display: flex;
    gap: 10px; /* space between buttons */
}

/* Grid layout */
.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr); /* 4 columns */
    gap: 20px;
    padding: 20px;
}

/* Each tile */
.tile {
    position: relative;
    height: 180px;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
}

/* Background image */
.tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Dark overlay on tile */
.tile::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    top: 0;
    left: 0;
}

/* Cuisine name */
.tile span {
    position: absolute;
    color: white;
    font-size: 20px;
    font-weight: bold;
    z-index: 2;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* Hover effect */
.tile:hover {
    transform: scale(1.05);
}
</style>
</head>
